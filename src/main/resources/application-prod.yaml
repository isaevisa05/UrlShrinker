server:
  port: 80

spring:
  application:
    name: urlshrinker

  datasource:
    url: jdbc:postgresql://localhost:5499/root
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false